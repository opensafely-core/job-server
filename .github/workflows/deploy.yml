---
name: Deploy

permissions:
  contents: read

env:
  IMAGE_NAME: job-server
  HOST: dokku4.ebmdatalab.net
  PUBLIC_IMAGE_NAME: ghcr.io/opensafely-core/job-server
  REGISTRY: ghcr.io
  SSH_AUTH_SOCK: /tmp/agent.sock

on:
  push:
    branches: [main]

concurrency: deploy-production

jobs:
  test-and-build-docker-image:
    uses: ./.github/workflows/main.yml
    permissions:
      contents: read

  deploy:
    needs: [test-and-build-docker-image]

    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: write

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: opensafely-core/setup-action@5b3030fbbcf069c94e352b4f0a94100fae4dbd82 # v1.6.1
        with:
          install-just: true

      - name: Download docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
            name: job-server-image
            path: /tmp/image

      - name: Import docker image
        # Note that this filename is also set in the build workflow.
        # Changing it will require updating it elsewhere.
        run: docker image load --input /tmp/image/job-server.tar.zst

      - name: Test image we imported from previous job works
        run: |
            SKIP_BUILD=1 just docker-serve prod -d
            sleep 5
            just docker-smoke-test || { docker logs job-server-prod-1; exit 1; }

      - name: Publish image
        run: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${GITHUB_ACTOR}" --password-stdin
            docker tag "$IMAGE_NAME" "$PUBLIC_IMAGE_NAME:latest"
            docker push "$PUBLIC_IMAGE_NAME:latest"

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_RELEASE_INTEGRATION_TOKEN }}
          SENTRY_ORG: ebm-datalab
          SENTRY_PROJECT: job-server
        with:
          environment: production
          finalize: false

      - name: Deploy image
        run: |
            set -euo pipefail

            # Find the full qualified "repo digest" for this image
            IMAGE_DIGEST="$(
              docker inspect --format='{{join .RepoDigests "\n"}}' "$PUBLIC_IMAGE_NAME:latest" \
                | grep --fixed-strings "$PUBLIC_IMAGE_NAME" || true
            )"
            # Fail if we have none or more than one (as indicated by the presence of whitespace)
            if [[ -z "$IMAGE_DIGEST" || "$IMAGE_DIGEST" =~ [[:space:]] ]]; then
              echo "Expected exactly one value in IMAGE_DIGEST, got: $IMAGE_DIGEST"
              echo
              echo "Debug info:"
              set -x
              docker inspect --format='{{join .RepoDigests "\n"}}' "$PUBLIC_IMAGE_NAME:latest"
              exit 1
            fi

            echo "Deploying $IMAGE_DIGEST to $HOST"
            ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null
            ssh-add - <<< "${{ secrets.DOKKU4_DEPLOY_SSH_KEY }}"
            ssh -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" "dokku@$HOST" \
              git:from-image job-server "$IMAGE_DIGEST"

      - name: Finalize Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_RELEASE_INTEGRATION_TOKEN }}
          SENTRY_ORG: ebm-datalab
          SENTRY_PROJECT: job-server
        with:
          environment: production
          finalize: true

      - name: Create Honeycomb Marker
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.2.10 -R honeycombio/honeymarker -p '*-linux-amd64*' -O honeymarker
          chmod 755 ./honeymarker
          # --dataset __all__ will ad an marker to *all* production datasets (this writekey is for production)
          ./honeymarker --writekey ${{ secrets.HC_MARKER_APIKEY }} --dataset job-server add --type deploy --msg "job-server deploy $GITHUB_SHA"
