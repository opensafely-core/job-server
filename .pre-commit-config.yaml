default_language_version:
  python: python3.12

repos:
  - repo: local
    hooks:
    - id: format
      name: format
      entry: just format
      language: system
      types: [python]
      require_serial: true
    - id: django-upgrade
      name: django-upgrade
      entry: just django-upgrade
      language: system
      types: [python]
      require_serial: true
    - id: lint
      name: lint
      entry: just lint
      language: system
      types: [python]
      require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: debug-statements
    - id: check-ast
    - id: check-json
    - id: check-toml
    - id: check-yaml
    - id: detect-private-key

  - repo: https://github.com/rtts/djhtml
    rev: 8577ec017145d76a0b954ebb7cb3169d4303014c # v3.0.11
    hooks:
      - id: djhtml
        entry: djhtml --tabwidth 2 # Use a tabwidth of 2 for HTML files
        files: ^templates/.*\.html$ # Indent only HTML files in template directories

  - repo: https://github.com/hadolint/hadolint
    rev: b3555ba9c2bfd9401e79f2f0da68dd1ae38e10c7 # v2.12.0
    hooks:
    - id: hadolint-docker
